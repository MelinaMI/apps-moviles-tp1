<template id="favorite-card-template">
  <div class="favorite-card">

    <img class="fav-img" alt="" />

    <div class="fav-info">
      <h3 class="fav-title"></h3>
      <p class="fav-meta"><span class="fav-label">Priority:</span> <span class="fav-priority"></span></p>
      <p class="fav-meta"><span class="fav-label">Category:</span> <span class="fav-category"></span></p>
      <p class="fav-meta fav-note-row" style="display:none"><span class="fav-label">Note:</span> <span class="fav-note"></span></p>
    </div>

    <button class="fav-heart" aria-label="Remove from favorites">
        <i class="fa-solid fa-heart"></i>
    </button>

  </div>
</template>
